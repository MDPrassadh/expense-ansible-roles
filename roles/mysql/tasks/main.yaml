    - name: Ansible to Install pip3
      ansible.builtin.package:
        name: python3-pip
        state: present

    - name: Install PyMySQL + cryptography
      ansible.builtin.pip:
        name: [PyMySQL, cryptography]
        executable: pip3

    - name: Install MySQL Server
      ansible.builtin.package:
        name: mysql-server
        state: present

    - name: Start MySQL service
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: yes

    - name: Setup MySQL root user restricted to backend
      community.mysql.mysql_user:
        name: root
        host: "10.0.11.%"       #host: "{{ backend_host }}"
        password: "{{ mysql_root_password }}"
        priv: "*.*:ALL,GRANT"
        state: present

    - name: Check MySQL connection from backend
      community.mysql.mysql_info:
        login_user: root
        login_password: "{{ mysql_root_password }}"
        login_host: "{{ login_host }}"
      ignore_errors: true
      register: mysql_info

    - name: Print MySQL info
      ansible.builtin.debug:
        msg: "{{ mysql_info }}"







